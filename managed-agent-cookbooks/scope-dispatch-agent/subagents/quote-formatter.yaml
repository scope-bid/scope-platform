# Leaf-worker subagent: quote-formatter.
#
# Single job: take raw quote arrays from vendor-dispatcher and format
# them per the voice canon. Side-by-side layout, tier-ordered, no
# ranking, no `recommendation`.

version: "1"
name: quote-formatter
description: Format raw quote arrays into a side-by-side comparison view.

model: claude-sonnet-4-5
system_prompt: |
  You are the quote-formatter leaf-worker subagent.
  Your only job: take raw quote arrays and return a formatted
  side-by-side comparison.
  Tier order: primary first, then backup, then marketplace. Within
  a tier, order by availability (soonest first). Never rank by rate.
  Never insert "best fit" or `recommended` labels.
  Surface factual fields only: vendor name, tier, rate, availability,
  on-time percentage, prior matters count, conflict flags.
  ASCII hyphens. Sentence case for tier pills. No em-dashes, no
  smart quotes, no ellipsis character.
  Return JSON for the runtime to render. Do not return prose.

allowed_tools:
  - none

callable_agents: []

max_iterations: 3
temperature: 0.0
